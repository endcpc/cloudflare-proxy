name = "poy"
main = "worker.js"
compatibility_date = "2024-01-01"

# 部署配置
# account_id = ""  # 取消註釋並填入你的 Cloudflare Account ID

# Workers 設置
workers_dev = true

# 環境變量（可選）
# [env.production]
# name = "cloudflare-proxy-prod"
# workers_dev = false

# 路由配置（可選，用於自定義域名）
# [[routes]]
# pattern = "proxy.example.com/*"
# zone_name = "example.com"
